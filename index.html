<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: transparent; overflow: hidden; display: flex; align-items: center; }
    .container { display: flex; align-items: center; font-family: sans-serif; color: white; }
    input[type=checkbox] { width: 40px; height: 40px; cursor: pointer; accent-color: #8A2BE2; }
    label { font-size: 24px; margin-left: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <input type="checkbox" id="agreeCheckbox">
    <label for="agreeCheckbox">Agree</label>
  </div>
  <script>
    const checkbox = document.getElementById('agreeCheckbox');
    if (localStorage.getItem('userAgreed') === 'true') { checkbox.checked = true; }
    checkbox.addEventListener('change', () => {
      localStorage.setItem('userAgreed', checkbox.checked);
    });
  </script>
</body>
</html>
